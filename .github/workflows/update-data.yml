name: Update Phish show data

on:
  schedule:
    - cron: '0 13 * * 1' # Mondays at 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest show data
        env:
          PHISHNET_API_KEY: ${{ secrets.PHISHNET_API_KEY }}
          PHISHNET_USERNAME: fergatron3030
        run: node scripts/fetch-data.js

      - name: Commit data if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/shows.json
          git diff --cached --quiet || git commit -m "Update show data"
          git push
